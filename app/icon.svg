<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2236"/>
      <stop offset="100%" stop-color="#1f3a55"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0613f"/>
      <stop offset="100%" stop-color="#b03a1f"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- coral accent dot — top-left -->
  <circle cx="100" cy="100" r="28" fill="url(#accent)"/>
  <!-- S letter -->
  <text x="120" y="370" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="320" fill="#C2E6F5" letter-spacing="-12">S</text>
  <!-- ampersand — small italic -->
  <text x="330" y="210" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="400" font-size="120" fill="#e0613f">&amp;</text>
</svg>
